kind = "web"
previewPath = "/"
title = "Quran Lens App"
version = "1.0.0"
id = "artifacts/quran-lens"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22425

[services.development]
run = "pnpm --filter @workspace/quran-lens run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quran-lens", "run", "build" ]
publicDir = "artifacts/quran-lens/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22425"
BASE_PATH = "/"
